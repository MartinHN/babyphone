<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Mic Stream — Broadcaster</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  body { font-family: system-ui, sans-serif; max-width: 480px; margin: 60px auto; text-align: center; color: #1a1a1a; }
  h1 { font-size: 1.3rem; }
  #status { margin: 24px 0; padding: 14px; border-radius: 8px; background: #f0f0f0; font-size: 0.95rem; }
  #status.live { background: #d7f5dd; color: #14532d; }
  #status.error { background: #fde2e2; color: #7f1d1d; }
  button { font-size: 1rem; padding: 10px 20px; border-radius: 8px; border: 1px solid #333; background: white; cursor: pointer; }
  button:disabled { opacity: 0.5; cursor: default; }
  #listeners { margin-top: 20px; font-size: 0.9rem; color: #555; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #999; margin-right: 6px; }
  .dot.live { background: #16a34a; }
</style>
</head>
<body>
  <h1>🎙️ Mic Stream — Laptop (Broadcaster)</h1>
  <div id="status"><span class="dot"></span><span id="statusText">Not started</span></div>
  <button id="startBtn">Start Broadcasting Mic</button>
  <div id="listeners">No phones connected yet</div>

<script>
const startBtn = document.getElementById("startBtn");
const statusEl = document.getElementById("status");
const statusText = document.getElementById("statusText");
const dot = statusEl.querySelector(".dot");
const listenersEl = document.getElementById("listeners");

let localStream = null;
let ws = null;
const peers = new Map(); // listenerId -> RTCPeerConnection

function setStatus(text, cls) {
  statusText.textContent = text;
  statusEl.className = cls || "";
  dot.className = "dot" + (cls === "live" ? " live" : "");
}

function updateListenerCount() {
  const n = peers.size;
  listenersEl.textContent = n === 0 ? "No phones connected yet" : `${n} phone(s) connected`;
}

async function start() {
  startBtn.disabled = true;
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  } catch (err) {
    setStatus("Mic access denied: " + err.message, "error");
    startBtn.disabled = false;
    return;
  }

  setStatus("Mic captured. Waiting for phones...", "live");
  connectSignaling();
}

function connectSignaling() {
  const proto = location.protocol === "https:" ? "wss" : "ws";
  ws = new WebSocket(`${proto}://${location.host}`);

  ws.onopen = () => {
    ws.send(JSON.stringify({ type: "register", role: "broadcaster" }));
  };

  ws.onmessage = async (event) => {
    const msg = JSON.parse(event.data);

    if (msg.type === "listener-join") {
      await createPeerForListener(msg.id);
    } else if (msg.type === "listener-leave") {
      const pc = peers.get(msg.id);
      if (pc) pc.close();
      peers.delete(msg.id);
      updateListenerCount();
    } else if (msg.type === "answer") {
      const pc = peers.get(msg.id);
      if (pc) await pc.setRemoteDescription({ type: "answer", sdp: msg.sdp });
    } else if (msg.type === "ice") {
      const pc = peers.get(msg.id);
      if (pc && msg.candidate) await pc.addIceCandidate(msg.candidate);
    }
  };

  ws.onclose = () => setStatus("Signaling server disconnected", "error");
}

async function createPeerForListener(id) {
  const pc = new RTCPeerConnection({ iceServers: [] }); // LAN only, no STUN needed
  peers.set(id, pc);
  updateListenerCount();

  localStream.getTracks().forEach((track) => pc.addTrack(track, localStream));

  pc.onicecandidate = (e) => {
    if (e.candidate) {
      ws.send(JSON.stringify({ type: "ice", id, candidate: e.candidate }));
    }
  };

  pc.onconnectionstatechange = () => {
    if (pc.connectionState === "connected") updateListenerCount();
  };

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  ws.send(JSON.stringify({ type: "offer", id, sdp: offer.sdp }));
}

startBtn.addEventListener("click", start);
</script>
</body>
</html>
